<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Deteksi Orang & Benda</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h2>AI Deteksi Orang & Benda</h2>

<div class="controls">
<button id="btnBack">Kamera Belakang</button>
<button id="btnFront">Kamera Depan</button>
<button id="btnDetect">Mulai Deteksi</button>
<button id="btnStop">Stop</button>
</div>

<div class="camera-box">
<video id="video" autoplay muted playsinline></video>
<canvas id="canvas"></canvas>
</div>

<p id="status">Status: Menunggu kamera</p>
<p id="personCount">Jumlah orang: 0</p>
<p id="objectText">Sedang memegang: -</p>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.16.0"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
<script src="script.js"></script>

</body>
</html>
