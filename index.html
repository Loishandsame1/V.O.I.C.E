<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>AI Deteksi Orang & Benda</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>AI Deteksi Orang & Benda</h2>

<div class="controls">
  <button id="btnOn">Nyalakan Kamera</button>
  <button id="btnOff">Matikan Kamera</button>
  <button id="btnDetect">Mulai Deteksi</button>
  <button id="btnStop">Stop Deteksi</button>
</div>

<div class="camera-box">
  <video id="video" autoplay muted></video>
  <canvas id="canvas"></canvas>
</div>

<p id="status">Status: Menunggu kamera</p>
<p id="objectText">Sedang memegang: -</p>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.16.0"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
<script src="script.js"></script>
</body>
</html>
